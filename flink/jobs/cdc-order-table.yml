source:
  type: postgres
  name: Postgres Source
  hostname: 192.168.200.1
  port: 5432
  username: postgres
  password: admin
  tables: 'olist_generate.public.orders'
  slot.name: flink_slot_order
  scan.startup.mode: initial
  
sink:
  type: starrocks
  name: StarRocks Sink
  jdbc-url: jdbc:mysql://192.168.200.1:9030
  load-url: 192.168.200.1:8030
  username: root
  password: ""
  sink.buffer-flush.interval-ms: 5000
  sink.properties.columns: 'order_id, order_purchase_timestamp, order_status, customer_id, order_approved_at, order_delivered_carrier_date, order_delivered_customer_date, order_estimated_delivery_date, source_updated_at, starrocks_arrived_at=utc_timestamp()'

pipeline:
  name: Postgres to StarRocks CDC
  parallelism: 1

route:
  - source-table: 'public.\.*'
    sink-table: 'ods.<>'
    replace-symbol: '<>'